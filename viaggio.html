<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaggio - TravelDash Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="inner-header">
        <a href="index.html" class="back-button">❮ I Miei Viaggi</a>
        <h1>Giappone 2026</h1>
    </header>

        <main class="trip-content">
        
        <h2 class="section-title">Preventivo Stimato</h2>

        <div class="ios-list">
            <div class="ios-list-item">
                <div class="item-icon" style="background: #FF9500;">✈️</div>
                <div class="item-text">Voli A/R</div>
                <div class="item-value">€ 450</div>
            </div>
            <div class="ios-list-item">
                <div class="item-icon" style="background: #34C759;">🏨</div>
                <div class="item-text">Hotel (5 notti)</div>
                <div class="item-value">€ 300</div>
            </div>
            <div class="ios-list-item">
                <div class="item-icon" style="background: #AF52DE;">🍣</div>
                <div class="item-text">Cibo (Budget)</div>
                <div class="item-value">€ 250</div>
            </div>
        </div>

        <button class="ios-primary-button">+ Aggiungi Spesa Prevista</button>

    </main>


    <nav class="bottom-tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">💰</span>
            <span class="tab-label">Preventivi</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🏨</span>
            <span class="tab-label">Prenota</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🚗</span>
            <span class="tab-label">Mappe/AI</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">💸</span>
            <span class="tab-label">Spese</span>
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">✅</span>
            <span class="tab-label">Tappe</span>
        </a>
    </nav>

</body>
</html>
